<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeepScan | Analysis Result</title>
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --bg: #0f172a; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0f172a; color: white; 
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
        }
        .container { 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px);
            padding: 3rem; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            width: 450px; text-align: center;
        }
        .prediction { 
            font-size: 1.5rem; font-weight: bold; margin: 2rem 0;
            padding: 1rem; border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 5px solid var(--primary);
        }
        .btn {
            display: inline-block; text-decoration: none; width: 100%;
            background: #1e293b; color: var(--primary);
            padding: 1rem; border: 1px solid var(--primary); border-radius: 12px;
            font-weight: bold; transition: 0.3s;
        }
        .btn:hover { background: var(--primary); color: #0f172a; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: var(--secondary)">Analysis Result</h1>
        <p>Forensic scan of the image is complete.</p>
        
        <div class="prediction">
            {{ prediction }}
        </div>

        <a href="/" class="btn">SCAN ANOTHER IMAGE</a>
    </div>
</body>
</html>
