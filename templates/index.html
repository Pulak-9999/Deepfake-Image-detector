<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DeepScan AI | Forensic Tool</title>
    <style>
        :root { --primary: #00f2fe; --secondary: #4facfe; --bg: #0f172a; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
        }
        .container { 
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px);
            padding: 3rem; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); width: 450px; text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; font-size: 1.1rem; margin-bottom: 2rem; }
        
        /* Styled File Input */
        .upload-area {
            border: 2px dashed #475569; border-radius: 16px; padding: 2rem; cursor: pointer; transition: 0.3s;
        }
        .upload-area:hover { border-color: var(--primary); background: rgba(79, 172, 254, 0.05); }
        input[type="file"] { font-size: 1rem; color: #94a3b8; cursor: pointer; width: 100%; }
        
        .btn {
            margin-top: 2rem; width: 100%; background: linear-gradient(to right, var(--secondary), var(--primary));
            color: #0f172a; padding: 1rem; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }
    </style>
</head>
<body>
    <div class="container">
        <h1>DeepScan AI</h1>
        <p>Advanced Digital Forensics System</p>
        <form action="/predict" method="post" enctype="multipart/form-data">
            <div class="upload-area">
                <input type="file" name="file" required>
            </div>
            <button type="submit" class="btn">START ANALYSIS</button>
        </form>
    </div>
</body>
</html>
