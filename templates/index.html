<!DOCTYPE html>
<html>
<head>
    <title>DeepScan AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; text-align: center; padding-top: 50px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; width: 400px; }
        h1 { color: #212529; margin-bottom: 10px; }
        p { color: #6c757d; margin-bottom: 30px; }
        .file-input { margin-bottom: 20px; }
        .btn { background-color: #0d6efd; color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background-color: #0b5ed7; }
    </style>
</head>
<body>
    <div class="card">
        <h1>DeepScan AI</h1>
        <p>Upload a photo to detect AI manipulation</p>
        
        <form action="/predict" method="post" enctype="multipart/form-data">
            <input type="file" name="file" class="file-input" required>
            <br>
            <button type="submit" class="btn">Verify Image</button>
        </form>
    </div>
</body>
</html>
